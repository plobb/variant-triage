name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/ tests/

  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install mypy pydantic pydantic-settings types-passlib structlog
      - run: mypy --strict app/domain/ app/ingestion/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: variant_triage
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/variant_triage
      SECRET_KEY: ci-test-secret-key
      ENVIRONMENT: testing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps for cyvcf2
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ make \
            zlib1g-dev libbz2-dev liblzma-dev \
            libcurl4-openssl-dev libssl-dev
      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE variant_triage_test;"
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ --cov=app --cov-report=term-missing

  nextflow-lint:
    name: Nextflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nextflow
        run: |
          cd /tmp
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
      - name: Validate pipeline syntax
        run: |
          nextflow run nextflow/main.nf --help || true
          nextflow config nextflow/nextflow.config -profile standard
