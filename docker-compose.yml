version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: variant_triage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d variant_triage"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      target: runtime
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/variant_triage
      SECRET_KEY: ${SECRET_KEY:-dev-only-insecure-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app   # live-reload in development
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload

volumes:
  postgres_data:
